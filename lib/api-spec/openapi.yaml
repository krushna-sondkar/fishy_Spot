openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Fishy Spot API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: fish
    description: Fish catalogue operations
  - name: orders
    description: Order operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /fish:
    get:
      operationId: listFish
      tags: [fish]
      summary: List the fish catalogue
      responses:
        "200":
          description: Fish catalogue
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Fish"
  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List all orders (admin)
      responses:
        "200":
          description: Orders list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Place a new order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderRequest"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateOrderResponse"
  /orders/stats:
    get:
      operationId: getOrderStats
      tags: [orders]
      summary: Aggregate order stats (totals, popular fish, area breakdown)
      responses:
        "200":
          description: Stats payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderStats"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    FishCategory:
      type: string
      enum:
        - Sea Fish
        - Prawns & Shellfish
        - Speciality
    Fish:
      type: object
      required:
        - id
        - name
        - localName
        - category
        - pricePerKg
        - emoji
        - description
        - available
      properties:
        id:
          type: string
        name:
          type: string
        localName:
          type: string
        category:
          $ref: "#/components/schemas/FishCategory"
        pricePerKg:
          type: number
        emoji:
          type: string
        description:
          type: string
        available:
          type: boolean
    CutPreference:
      type: string
      enum:
        - Whole Fish
        - Curry Cut
        - Fillet
        - Steak Cut
    DeliverySlot:
      type: string
      enum:
        - Evening (4 PM - 7 PM)
        - Late Evening (7 PM - 9 PM)
    OrderItem:
      type: object
      required:
        - fishId
        - name
        - emoji
        - pricePerKg
        - quantityKg
        - cut
        - lineTotal
      properties:
        fishId:
          type: string
        name:
          type: string
        emoji:
          type: string
        pricePerKg:
          type: number
        quantityKg:
          type: number
        cut:
          $ref: "#/components/schemas/CutPreference"
        lineTotal:
          type: number
    CustomerDetails:
      type: object
      required:
        - fullName
        - mobile
        - flat
        - building
        - street
        - area
        - pincode
      properties:
        fullName:
          type: string
          minLength: 2
        mobile:
          type: string
          pattern: "^[0-9]{10}$"
        alternateMobile:
          type: string
        flat:
          type: string
        building:
          type: string
        street:
          type: string
        area:
          type: string
        landmark:
          type: string
        pincode:
          type: string
          pattern: "^[0-9]{6}$"
    CreateOrderRequest:
      type: object
      required:
        - customer
        - items
        - deliverySlot
        - subtotal
        - deliveryCharge
        - total
      properties:
        customer:
          $ref: "#/components/schemas/CustomerDetails"
        items:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/OrderItem"
        deliverySlot:
          $ref: "#/components/schemas/DeliverySlot"
        specialInstructions:
          type: string
        subtotal:
          type: number
        deliveryCharge:
          type: number
        total:
          type: number
    Order:
      allOf:
        - $ref: "#/components/schemas/CreateOrderRequest"
        - type: object
          required:
            - orderId
            - createdAt
            - status
          properties:
            orderId:
              type: string
            createdAt:
              type: string
              format: date-time
            status:
              type: string
              enum: [pending, confirmed, delivered, cancelled]
    CreateOrderResponse:
      type: object
      required:
        - success
        - orderId
        - order
      properties:
        success:
          type: boolean
        orderId:
          type: string
        order:
          $ref: "#/components/schemas/Order"
    OrderStats:
      type: object
      required:
        - totalOrders
        - totalRevenue
        - popularFish
        - areaBreakdown
        - recentOrders
      properties:
        totalOrders:
          type: integer
        totalRevenue:
          type: number
        popularFish:
          type: array
          items:
            type: object
            required: [name, emoji, totalKg]
            properties:
              name:
                type: string
              emoji:
                type: string
              totalKg:
                type: number
        areaBreakdown:
          type: array
          items:
            type: object
            required: [area, count]
            properties:
              area:
                type: string
              count:
                type: integer
        recentOrders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
